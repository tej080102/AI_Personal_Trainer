# ============================================================
# AI Personal Trainer - Docker Compose
# ============================================================
# 
# SIMPLE USAGE:
#   docker-compose up -d
#   
#   Wait for startup (~2 min), then:
#   - API: http://localhost:8000 (Swagger: http://localhost:8000/docs)
#   - UI:  http://localhost:8501
#
# GPU will be auto-detected and used if available.
# No GPU? It will run on CPU (slower but works).
#
# ============================================================

services:
  # ============= PostgreSQL Database ============= #
  postgres:
    image: postgres:15-alpine
    container_name: trainer_postgres
    environment:
      POSTGRES_DB: trainer
      POSTGRES_USER: trainer_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainer_user -d trainer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trainer_network
    restart: unless-stopped

  # ============= Ollama LLM Service ============= #
  # GPU is auto-detected. If you have NVIDIA GPU + Container Toolkit,
  # it will use GPU. Otherwise falls back to CPU.
  ollama:
    image: ollama/ollama:latest
    container_name: trainer_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - trainer_network
    # Pull mistral model on first startup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        sleep 5
        /bin/ollama pull mistral
        wait
    restart: unless-stopped
    # GPU Support (optional) - works without this if no GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ============= FastAPI Backend ============= #
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trainer_api
    environment:
      POSTGRES_URL: postgresql://trainer_user:${DB_PASSWORD:-changeme123}@postgres:5432/trainer
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-generate-with-python-secrets}
      CORS_ORIGINS: http://localhost:8501,http://frontend:8501
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    command: uvicorn app.server:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app  # Hot reload for development
    networks:
      - trainer_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 120s  # Give time for Ollama to download model
      retries: 3

  # ============= Streamlit Frontend ============= #
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: trainer_frontend
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - trainer_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local

networks:
  trainer_network:
    driver: bridge

